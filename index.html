var LABELS = {es:'Espa&ntilde;a',id:'Indonesia',col:'Colombia',mx:'M&eacute;xico',ae:'Dubai',doc:'General'};

function getCode(p){
  p=p||'';
  if(p.indexOf('Espa')>-1||p.indexOf('espa')>-1)return 'es';
  if(p.indexOf('Indonesia')>-1||p.indexOf('Bali')>-1)return 'id';
  if(p.indexOf('Colombia')>-1)return 'col';
  if(p.indexOf('xico')>-1||p.indexOf('Mexico')>-1)return 'mx';
  if(p.indexOf('Dubai')>-1||p.indexOf('UAE')>-1)return 'ae';
  return 'doc';
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isAmparo(t){return (t||'').toUpperCase().indexOf('AMPARO')>-1||(t||'').toUpperCase().indexOf('JUICIO')>-1;}

function makeLink(url,isAmp){
  url=String(url||'').trim().replace(/[\r\n\t]/g,'');
  if(!url||url.indexOf('http')!==0)return '';
  var cls=isAmp?'card-link card-link-gold':'card-link';
  var label=isAmp?'Ver Carpeta de Amparos':'Ver Documento';
  return '<a class="'+cls+'" href="'+url+'" target="_blank" rel="noopener"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'+label+'</a>';
}

function render(){
  var q=currentSearch.toLowerCase();
  var filtered=allEvents.filter(function(e){
    var mf=currentFilter==='all'||e.code===currentFilter;
    var ms=!q||(e.titulo||'').toLowerCase().indexOf(q)>-1||(e.sintesis||'').toLowerCase().indexOf(q)>-1;
    return mf&&ms;
  });
  document.getElementById('hdr-count').textContent=allEvents.length+' documentos registrados';
  document.getElementById('ctrl-count').textContent=filtered.length+' / '+allEvents.length;
  if(filtered.length===0){document.getElementById('timeline').innerHTML='<p class="empty">Sin resultados.</p>';return;}

  var years={},yrOrder=[];
  filtered.forEach(function(e){
    var p=(e.fecha||'').split('/');
    var yr=(p[2]&&p[2]!=='Sin fecha')?p[2]:'Sin fecha';
    if(!years[yr]){years[yr]=[];yrOrder.push(yr);}
    years[yr].push(e);
  });

  var html='';
  yrOrder.forEach(function(yr){
    html+='<div class="year-label">'+yr+'</div>';
    years[yr].forEach(function(e){
      var amp=isAmparo(e.titulo);
      var flag=FLAGS[e.code]||FLAGS.doc;
      var label=LABELS[e.code]||LABELS.doc;
      html+='<div class="card'+(amp?' card-amparo':'')+'">'+
        '<div class="card-meta">'+
          (e.fecha&&e.fecha!=='Sin fecha'?'<span class="card-date">'+escH(e.fecha)+'</span>':'')+
          '<span class="badge badge-'+e.code+'"><span class="badge-flag">'+flag+'</span>'+label+'</span>'+
        '</div>'+
        '<h3>'+escH(e.titulo)+'</h3>'+
        (e.sintesis?'<p>'+escH(e.sintesis)+'</p>':'')+
        makeLink(e.enlace,amp)+
      '</div>';
    });
  });
  document.getElementById('timeline').innerHTML=html;
}

function parseCSV(text){
  var result=[],lines=text.split('\n');
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=[],cur='',inQ=false;
    for(var j=0;j<line.length;j++){
      var ch=line[j];
      if(ch==='"'){if(inQ&&line[j+1]==='"'){cur+='"';j++;}else{inQ=!inQ;}}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    if(cols[0]&&cols[0]!=='Fecha')result.push(cols);
  }
  return result;
}

function loadFromSheet(){
  fetch(CSV_URL).then(function(r){if(!r.ok)throw new Error('no');return r.text();})
  .then(function(text){
    var rows=parseCSV(text);
    if(rows.length>0){
      var fresh=rows.map(function(r){
        var pais=r[1]||'';
        var code=getCode(pais);
        return{fecha:(r[0]||'').trim(),pais:pais,code:code,titulo:(r[2]||'').trim(),sintesis:(r[3]||'').trim(),enlace:(r[4]||'').trim()};
      }).filter(function(e){return e.titulo;});
      allEvents=fresh;render();
    }
  }).catch(function(){});
}

allEvents=BASE_DATA.map(function(e){return{fecha:e.fecha,pais:e.pais,code:e.code,titulo:e.titulo,sintesis:e.sintesis,enlace:(e.enlace||'').trim()};});
render();
loadFromSheet();

document.querySelectorAll('.btn-filter').forEach(function(btn){

    document.querySelectorAll('.btn-filter').forEach(function(b){b.classList.remove('active');});
    this.classList.add('active');currentFilter=this.getAttribute('data-f');render();
  });
});
